name: labortrack
description: Labor Attendance and Payroll Management App for construction supervisors.

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Navigation & Routing
  go_router: ^13.2.0
  
  # State Management
  riverpod: ^2.5.1
  riverpod_generator: ^2.5.3
  flutter_riverpod: ^2.5.1

  # Local Database
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  objectbox: ^2.4.0

  # Cloud Backend
  supabase_flutter: ^1.10.0
  
  # UI & Fonts
  google_fonts: ^6.1.0
  sizer: ^2.0.15
  cached_network_image: ^3.3.1
  fl_chart: ^0.65.0
  shimmer: ^3.0.0
  
  # SVG Support
  flutter_svg: ^2.0.10
  
  # Export (PDF & CSV)
  pdf: ^3.10.7
  printing: ^5.11.0
  csv: ^6.0.0
  path_provider: ^2.1.1
  share_plus: ^7.2.0
  
  # Utilities
  intl: ^0.19.0
  connectivity_plus: ^5.0.1
  uuid: ^4.0.0
  equatable: ^2.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  
  flutter_lints: ^3.0.0
  build_runner: ^2.4.6
  hive_generator: ^2.0.1
  riverpod_generator: ^2.5.3
  
flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
  
  fonts:
    - family: Manrope
      fonts:
        - asset: assets/fonts/Manrope-Light.ttf
          weight: 300
        - asset: assets/fonts/Manrope-Regular.ttf
          weight: 400
        - asset: assets/fonts/Manrope-Medium.ttf
          weight: 500
        - asset: assets/fonts/Manrope-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Manrope-Bold.ttf
          weight: 700
